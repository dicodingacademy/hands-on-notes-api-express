  deploy-vps:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy ke VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: APP_PORT,DATABASE_URL,JWT_SECRET,CORS_ORIGIN,GHCR_USER
          script: |
            docker pull ghcr.io/$GHCR_USER/notes-api-express:latest
            cd ~/hands-on-notes-api-express
            git checkout main
            git pull origin main
            cat > .env.docker << EOF
            PORT=$APP_PORT
            DATABASE_URL=$DATABASE_URL
            JWT_SECRET=$JWT_SECRET
            CORS_ORIGIN=$CORS_ORIGIN
            EOF
            sed "s|build: \.|image: ghcr.io/$GHCR_USER/notes-api-express:latest|" docker-compose.yml
            docker compose -f docker-compose.yml --env-file .env.docker up -d
            docker compose -f docker-compose.yml --env-file .env.docker exec -T app npm run migrate up
        env:
          APP_PORT: ${{ secrets.APP_PORT }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          CORS_ORIGIN: ${{ secrets.CORS_ORIGIN }}
          GHCR_USER: ${{ github.repository_owner }}